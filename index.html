<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jack The Trader - Powered by Deriv</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    #tv_chart_container {
      height: 400px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
    }
    .trade-buttons button {
      margin-right: 10px;
    }
  </style>
</head>
<body class="bg-light">

  <div class="container mt-4">
    <h1 class="text-center text-primary mb-4">📊 Jack The Trader <small class="text-muted fs-6">Powered by Deriv</small></h1>

    <!-- Chart Area -->
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Market</label>
        <select id="symbolSelector" class="form-select">
          <option value="R_10">Volatility 10 Index</option>
          <option value="R_25">Volatility 25 Index</option>
          <option value="R_50">Volatility 50 Index</option>
          <option value="R_75">Volatility 75 Index</option>
          <option value="R_100" selected>Volatility 100 Index</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Contract Type</label>
        <select id="contractTypeSelector" class="form-select">
          <option value="rise_fall">📈 Rise/Fall</option>
          <option value="digits">🔢 Digits (Even/Odd)</option>
          <option value="accumulators">➕ Accumulators</option>
        </select>
      </div>
    </div>

    <div id="tv_chart_container"></div>

    <!-- Contract Preview Section -->
    <div id="contractPreview" class="card p-3 mb-3">
      <h5>📋 Contract Info</h5>
      <p><strong>Type:</strong> <span id="contractType">Rise/Fall</span></p>
      <p><strong>Market:</strong> <span id="marketName">Volatility 100 Index</span></p>
      <p><strong>Indicators:</strong> Candles, Volume</p>
    </div>

    <!-- Trading Actions -->
    <div class="text-center trade-buttons mb-3">
      <button class="btn btn-success" onclick="startTrade()">Start Trade</button>
      <button class="btn btn-outline-secondary" onclick="showSettings()">⚙️ Settings</button>
      <button class="btn btn-outline-info" onclick="showIndicators()">📈 Indicators</button>
    </div>

    <!-- Login Modal (shown only when needed) -->
    <div id="loginModal" class="modal fade" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">🔐 Login Required</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p>You need to login to start trading or view your balance.</p>
            <button class="btn btn-primary" onclick="login()">Login with Deriv</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let chart;
    let isLoggedIn = false;

    function createChart() {
      const chartElement = document.getElementById("tv_chart_container");
      chart = LightweightCharts.createChart(chartElement, {
        width: chartElement.clientWidth,
        height: 400,
        layout: {
          backgroundColor: '#fff',
          textColor: '#000',
        },
        grid: {
          vertLines: { color: '#eee' },
          horzLines: { color: '#eee' },
        },
        crosshair: { mode: 0 },
        rightPriceScale: { visible: true },
        timeScale: { borderColor: '#aaa' },
      });

      const candleSeries = chart.addCandlestickSeries();
      const volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });

      // Dummy data
      const dummyData = [...Array(50)].map((_, i) => {
        const base = 100 + i;
        return {
          time: Math.floor(Date.now() / 1000) - (50 - i) * 60,
          open: base,
          high: base + Math.random() * 5,
          low: base - Math.random() * 5,
          close: base + Math.random() * 3,
          value: Math.floor(Math.random() * 100),
        };
      });

      candleSeries.setData(dummyData.map(({ time, open, high, low, close }) => ({ time, open, high, low, close })));
      volumeSeries.setData(dummyData.map(({ time, value }) => ({ time, value })));
    }

    function startTrade() {
      if (!isLoggedIn) {
        const modal = new bootstrap.Modal(document.getElementById("loginModal"));
        modal.show();
        return;
      }

      alert("🚀 Trade started!");
    }

    function login() {
      isLoggedIn = true;
      const modal = bootstrap.Modal.getInstance(document.getElementById("loginModal"));
      modal.hide();
      alert("✅ Logged in successfully.");
    }

    function showIndicators() {
      alert("📊 Showing indicators (candles, volume, etc.)");
    }

    function showSettings() {
      alert("⚙️ Settings panel will appear here.");
    }

    document.getElementById("symbolSelector").addEventListener("change", function () {
      document.getElementById("marketName").textContent = this.options[this.selectedIndex].text;
    });

    document.getElementById("contractTypeSelector").addEventListener("change", function () {
      document.getElementById("contractType").textContent = this.options[this.selectedIndex].text;
    });

    window.addEventListener("load", createChart);
  </script>
</body>
</html>
