<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jack The Trader - Powered by Deriv</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-light">

  <div class="container mt-5">
    <h1 class="text-center text-primary mb-4">📊 Jack The Trader</h1>

    <div id="login-section" class="text-center">
      <button class="btn btn-success btn-lg" id="loginBtn">🔐 Login with Deriv</button>

    <div id="dashboard" class="d-none">
      <div class="alert alert-info" id="user-info">Loading user info...</div>

      <div class="card mt-4">
        <div class="card-header bg-primary text-white">Live Market Price (R_100)</div>
        <div class="card-body">
          <h2 class="display-4" id="price">--</h2>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
