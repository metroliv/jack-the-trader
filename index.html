<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Platform</title>
  <link rel="stylesheet" href="styles.css"> <!-- Add your styles -->
</head>
<body>
  <!-- Login Section -->
  <div id="login-section">
    <button id="loginBtn">Login with Deriv</button>
  </div>

  <!-- User Info and Balance -->
  <div id="user-info"></div>
  <div id="balance-info"></div>

  <!-- Trading Chart -->
  <div id="tv_chart_container"></div>

  <!-- Symbol Selector and Place Trade -->
  <select id="symbolSelector">
    <!-- Add trading symbols here -->
    <option value="USDJPY">USD/JPY</option>
    <option value="EURUSD">EUR/USD</option>
    <!-- More symbols can go here -->
  </select>
  <button id="placeTradeBtn">Place Trade</button>

  <!-- Bots Section (Visible after login) -->
  <div id="bots-section" class="d-none">
    <h3>Your Bots</h3>
    <ul id="bots-list">
      <!-- Bots will be dynamically listed here -->
    </ul>
  </div>

  <!-- Placeholder for other user features -->
  <div id="features-section" class="d-none">
    <h3>Other Features</h3>
    <p>Explore other options available to you!</p>
  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
