<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jack The Trader - Powered by Deriv</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-light">

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="text-primary">📊 Jack The Trader</h1>
      <div id="login-section">
        <button class="btn btn-success" id="loginBtn">🔐 Login with Deriv</button>
      </div>
    </div>

    <div id="dashboard">
      <div class="alert alert-info" id="user-info">👤 You are browsing as guest</div>

      <div class="card mb-4">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
          <span>📈 Live Market Price</span>
          <select id="symbolSelector" class="form-select w-auto">
            <option value="R_100" selected>R_100</option>
            <option value="1HZ100V">1HZ100V</option>
            <option value="R_75">R_75</option>
            <option value="R_50">R_50</option>
            <option value="R_25">R_25</option>
          </select>
        </div>
        <div class="card-body">
          <h2 class="display-4 text-center" id="price">--</h2>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
