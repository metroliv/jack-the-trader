<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jack The Trader - Deriv Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <style>
    #tv_chart_container {
      height: 500px;
      width: 100%;
    }
  </style>
</head>
<body class="bg-light">

  <div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="text-primary">📊 Jack The Trader</h2>
      <div id="login-section">
        <button class="btn btn-success" id="loginBtn">🔐 Login with Deriv</button>
      </div>
    </div>

    <div id="user-info" class="alert alert-secondary">👤 You are browsing as guest</div>

    <!-- Symbol Selector -->
    <div class="mb-3">
      <label for="symbolSelector" class="form-label">Select Market</label>
      <select id="symbolSelector" class="form-select">
        <option value="R_100">R_100</option>
        <option value="1HZ100V">1HZ100V</option>
        <option value="R_75">R_75</option>
        <option value="R_50">R_50</option>
      </select>
    </div>

    <!-- TradingView Chart -->
    <div class="card mb-4">
      <div class="card-header bg-dark text-white">📈 Live Chart (Powered by TradingView)</div>
      <div class="card-body">
        <div id="tv_chart_container"></div>
      </div>
    </div>

    <!-- Future Tabs for Digits, Rise/Fall, Multipliers, Bots -->
    <div class="alert alert-info">Coming soon: Digits, Rise/Fall, Bots, Accumulators...</div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
