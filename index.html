<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/lightweight-charts@3.3.0/dist/lightweight-charts.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    #chart-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      height: 500px;
    }

    select {
      padding: 10px;
      font-size: 14px;
      margin: 10px;
    }

    .button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    .button:hover {
      background-color: #45a049;
    }
  </style>
</head>

<body>

  <!-- Login Section -->
  <div id="login-section">
    <button id="loginBtn" class="button">Login</button>
  </div>

  <div id="user-info"></div>
  <div id="balance-info"></div>

  <!-- Dropdowns for symbol and chart type -->
  <div>
    <label for="symbolSelector">Choose Symbol:</label>
    <select id="symbolSelector">
      <option value="R_100">R_100</option>
      <option value="R_50">R_50</option>
      <option value="R_25">R_25</option>
    </select>
  </div>

  <div>
    <label for="chartTypeSelector">Chart Type:</label>
    <select id="chartTypeSelector">
      <option value="candlestick">Candlestick</option>
      <option value="line">Line</option>
    </select>
  </div>

  <!-- Chart Container -->
  <div id="chart-container"></div>

  <!-- Trade Button -->
  <button id="placeTradeBtn" class="button">Place Trade</button>

  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@3.3.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const APP_ID = "68037";
      const REDIRECT_URL = window.location.origin + window.location.pathname;
      const token = new URLSearchParams(window.location.search).get("token1");

      const loginBtn = document.getElementById("loginBtn");
      const loginSection = document.getElementById("login-section");
      const userInfo = document.getElementById("user-info");
      const balanceInfo = document.getElementById("balance-info");
      const symbolSelector = document.getElementById("symbolSelector");
      const chartContainer = document.getElementById("chart-container");
      const placeTradeBtn = document.getElementById("placeTradeBtn");
      const chartTypeSelector = document.getElementById("chartTypeSelector");

      let ws, tickSubscriptionId = null;
      let currentSymbol = symbolSelector.value;
      let chart, chartSeries;

      // Initialize the chart
      function initChart() {
        chart = LightweightCharts.createChart(chartContainer, {
          width: chartContainer.clientWidth,
          height: 500,
          layout: { background: { color: "#ffffff" }, textColor: "#333" },
          grid: { vertLines: { color: "#eee" }, horzLines: { color: "#eee" } },
          crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
          priceScale: { borderColor: "#ccc" },
          timeScale: { borderColor: "#ccc" },
        });

        // Default chart type is candlestick
        chartSeries = chart.addCandlestickSeries();
      }

      // Update chart series type
      function updateChartSeries(type) {
        // Remove the current chart series
        if (chartSeries) {
          chart.removeSeries(chartSeries);
        }

        // Add new chart series based on the selected type
        if (type === "line") {
          chartSeries = chart.addLineSeries();
        } else if (type === "candlestick") {
          chartSeries = chart.addCandlestickSeries();
        }
      }

      // Send WebSocket messages
      function sendMessage(message) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(message));
        }
      }

      // Authorization and subscriptions
      function authorizeAndSubscribe(symbol) {
        if (token) sendMessage({ authorize: token });
        subscribeToTicks(symbol);
        subscribeToBalance();
        fetchCandles(symbol);
      }

      function subscribeToTicks(symbol) {
        sendMessage({ ticks: symbol, subscribe: 1 });
      }

      function unsubscribeTicks() {
        if (tickSubscriptionId) {
          sendMessage({ forget: tickSubscriptionId });
          tickSubscriptionId = null;
        }
      }

      function subscribeToBalance() {
        if (token) sendMessage({ balance: 1, subscribe: 1 });
      }

      function fetchCandles(symbol) {
        sendMessage({
          candles: symbol,
          count: 100,
          granularity: 60, // 1-minute candles
        });
      }

      // Start WebSocket connection
      function startWebSocket(symbol) {
        if (ws) ws.close();

        ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

        ws.onopen = () => {
          console.log("✅ WebSocket connected");
          authorizeAndSubscribe(symbol);
        };

        ws.onmessage = ({ data }) => {
          const msg = JSON.parse(data);
          console.log("Message received:", msg);

          if (msg.error) return console.error("❌", msg.error.message);

          switch (msg.msg_type) {
            case "authorize":
              userInfo.innerHTML = `✅ Logged in as <strong>${msg.authorize.loginid}</strong>`;
              break;

            case "balance":
              const { balance, currency } = msg.balance;
              balanceInfo.innerHTML = `💰 Balance: <span class="text-dark">${currency} ${balance.toFixed(2)}</span>`;
              break;

            case "tick":
              tickSubscriptionId = msg.tick.id;
              const { quote, epoch } = msg.tick;
              console.log(`New tick data: ${quote} at ${epoch}`);

              if (quote && epoch) {
                document.getElementById("lastPrice").textContent = quote.toFixed(2);
                document.getElementById("marketName").textContent = currentSymbol;
                document.getElementById("status").textContent = "⚡ Live Data";
              }
              break;

            case "candles":
              const candleData = msg.candles.map(c => ({
                time: c.epoch,
                open: c.open,
                high: c.high,
                low: c.low,
                close: c.close,
              }));

              if (candleData && candleData.length > 0) {
                console.log("Candle data:", candleData);
                chartSeries.setData(candleData);
              } else {
                console.error("No candle data received");
              }
              break;

            default:
              console.log("Unknown message type:", msg);
          }
        };

        ws.onerror = (e) => console.error("⚠️ WS Error", e);
        ws.onclose = () => setTimeout(() => startWebSocket(currentSymbol), 1500);
      }

      // Handle login redirect
      if (token) {
        loginSection.classList.add("d-none");
        userInfo.textContent = "🔄 Logging in...";
      }

      loginBtn.addEventListener("click", () => {
        const loginUrl = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URL)}`;
        window.location.href = loginUrl;
      });

      // Symbol switching
      symbolSelector.addEventListener("change", () => {
        unsubscribeTicks();
        currentSymbol = symbolSelector.value;
        startWebSocket(currentSymbol);
        fetchCandles(currentSymbol); // Refresh candles on symbol change
      });

      // Chart type switching
      chartTypeSelector.addEventListener("change", () => {
        updateChartSeries(chartTypeSelector.value);
        fetchCandles(currentSymbol); // Refresh chart after type change
      });

      // Trade button (mock)
      placeTradeBtn.addEventListener("click", () => {
        if (!token) return alert("🚫 Login first to trade.");

        sendMessage({
          buy: 1,
          price: 1,
          parameters: {
            amount: 1,
            basis: "stake",
            contract_type: "CALL",
            currency: "USD",
            duration: 1,
            duration_unit: "m",
            symbol: currentSymbol,
          },
        });
      });

      // Chart init & WebSocket start
      initChart();
      startWebSocket(currentSymbol);
    });
  </script>
</body>

</html>
