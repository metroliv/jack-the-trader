<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deriv Real-Time Chart</title>
  <!-- Include Lightweight Charts Library -->
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    #chart-container {
      width: 100%;
      height: 500px;
    }
    #controls {
      margin-bottom: 10px;
    }
    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="controls">
    <label for="symbolSelector">Select Symbol:</label>
    <select id="symbolSelector">
      <option value="R_100">R_100</option>
      <option value="R_75">R_75</option>
      <option value="R_50">R_50</option>
      <option value="R_25">R_25</option>
      <!-- Add more symbols as needed -->
    </select>
  </div>
  <div id="chart-container"></div>
  <div id="status">Status: <span id="statusText">Initializing...</span></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const APP_ID = "YOUR_APP_ID"; // Replace with your actual app_id
      const symbolSelector = document.getElementById("symbolSelector");
      const statusText = document.getElementById("statusText");
      const chartContainer = document.getElementById("chart-container");

      let ws;
      let tickSubscriptionId = null;
      let currentSymbol = symbolSelector.value;

      // Initialize the chart
      const chart = LightweightCharts.createChart(chartContainer, {
        width: chartContainer.clientWidth,
        height: 500,
        layout: {
          background: { color: "#ffffff" },
          textColor: "#000000",
        },
        grid: {
          vertLines: { color: "#eeeeee" },
          horzLines: { color: "#eeeeee" },
        },
        crosshair: {
          mode: LightweightCharts.CrosshairMode.Normal,
        },
        priceScale: {
          borderColor: "#cccccc",
        },
        timeScale: {
          borderColor: "#cccccc",
          timeVisible: true,
          secondsVisible: true,
        },
      });

      const lineSeries = chart.addLineSeries();

      // Function to start WebSocket connection
      function startWebSocket(symbol) {
        if (ws) {
          ws.close();
        }

        ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

        ws.onopen = () => {
          statusText.textContent = "Connected. Subscribing to ticks...";
          // Subscribe to tick data for the selected symbol
          ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
        };

        ws.onmessage = (msg) => {
          const data = JSON.parse(msg.data);

          if (data.error) {
            console.error("Deriv API Error:", data.error.message);
            statusText.textContent = `Error: ${data.error.message}`;
            return;
          }

          if (data.msg_type === "tick") {
            const tick = data.tick;
            tickSubscriptionId = tick.id;

            lineSeries.update({
              time: tick.epoch,
              value: tick.quote,
            });

            statusText.textContent = `Live Data for ${symbol}: ${tick.quote}`;
          }
        };

        ws.onerror = (e) => {
          console.error("WebSocket error:", e);
          statusText.textContent = "WebSocket error. See console for details.";
        };

        ws.onclose = () => {
          console.warn("WebSocket closed. Reconnecting...");
          statusText.textContent = "Disconnected. Reconnecting...";
          setTimeout(() => startWebSocket(currentSymbol), 3000);
        };
      }

      // Handle symbol selection change
      symbolSelector.addEventListener("change", () => {
        const newSymbol = symbolSelector.value;
        if (ws && tickSubscriptionId) {
          ws.send(JSON.stringify({ forget: tickSubscriptionId }));
        }
        currentSymbol = newSymbol;
        startWebSocket(currentSymbol);
      });

      // Start WebSocket connection with the initial symbol
      startWebSocket(currentSymbol);
    });
  </script>
</body>
</html>
