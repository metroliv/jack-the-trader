<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack The Trader - Powered by Deriv</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    #tv_chart_container {
      height: 500px;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h1 class="text-center text-primary mb-4">📊 Jack The Trader</h1>

    <div id="login-section" class="text-center">
      <button class="btn btn-success btn-lg" id="loginBtn">🔐 Login with Deriv</button>
    </div>

    <div id="dashboard" class="mt-4">
      <div class="alert alert-info" id="user-info">Please login to continue...</div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="symbolSelector" class="form-label">Select Market:</label>
          <select id="symbolSelector" class="form-select">
            <option value="R_10">Volatility 10 Index</option>
            <option value="R_25">Volatility 25 Index</option>
            <option value="R_50">Volatility 50 Index</option>
            <option value="R_75">Volatility 75 Index</option>
            <option value="R_100" selected>Volatility 100 Index</option>
          </select>
        </div>
        <div class="col-md-6">
          <label for="contractTypeSelector" class="form-label">Select Contract Type:</label>
          <select id="contractTypeSelector" class="form-select">
            <option value="rise_fall">Rise/Fall</option>
            <option value="digits">Digits (Even/Odd)</option>
            <option value="accumulators">Accumulators</option>
          </select>
        </div>
      </div>

      <div id="tv_chart_container" class="mb-3"></div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const APP_ID = "68037";
      const REDIRECT_URL = window.location.href;
      const token = new URLSearchParams(window.location.search).get("token");

      const loginBtn = document.getElementById("loginBtn");
      const loginSection = document.getElementById("login-section");
      const userInfo = document.getElementById("user-info");
      const symbolSelector = document.getElementById("symbolSelector");
      const contractTypeSelector = document.getElementById("contractTypeSelector");

      if (token) {
        loginSection.classList.add("d-none");
        userInfo.textContent = "✅ Logged in via Deriv";
      }

      loginBtn.addEventListener("click", () => {
        const loginUrl = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URL)}`;
        window.location.href = loginUrl;
      });

      const chartContainer = document.getElementById("tv_chart_container");
      const chart = LightweightCharts.createChart(chartContainer, {
        width: chartContainer.clientWidth,
        height: 500,
        layout: {
          background: { color: '#ffffff' },
          textColor: '#333',
        },
        grid: {
          vertLines: { color: '#eee' },
          horzLines: { color: '#eee' },
        },
        crosshair: {
          mode: LightweightCharts.CrosshairMode.Normal,
        },
        priceScale: { borderColor: '#ccc' },
        timeScale: { borderColor: '#ccc' },
      });

      const lineSeries = chart.addLineSeries();
      let ws;
      let tickSubscriptionId;
      let currentSymbol = symbolSelector.value;

      function startWebSocket(symbol) {
        ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

        ws.onopen = () => {
          if (token) ws.send(JSON.stringify({ authorize: token }));
          ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
        };

        ws.onmessage = (msg) => {
          const data = JSON.parse(msg.data);
          if (data.msg_type === "tick") {
            const tick = data.tick;
            tickSubscriptionId = tick.id;

            lineSeries.update({
              time: Math.floor(tick.epoch),
              value: tick.quote,
            });

            // Additional contract type handling (demo display)
            const contractType = contractTypeSelector.value;
            if (contractType === "digits") {
              const lastDigit = tick.quote.toString().slice(-1);
              console.log("Digit contract: Last digit is", lastDigit, parseInt(lastDigit) % 2 === 0 ? "Even" : "Odd");
            }
          }
        };

        ws.onerror = (e) => console.error("WebSocket error:", e);
        ws.onclose = () => console.warn("WebSocket closed");
      }

      function updateMarket(symbol) {
        if (ws && tickSubscriptionId) {
          ws.send(JSON.stringify({ forget: tickSubscriptionId }));
          ws.close();
        }
        startWebSocket(symbol);
      }

      symbolSelector.addEventListener("change", () => {
        currentSymbol = symbolSelector.value;
        updateMarket(currentSymbol);
      });

      contractTypeSelector.addEventListener("change", () => {
        // Can extend logic to show different UI elements per contract type
        console.log("Selected contract type:", contractTypeSelector.value);
      });

      startWebSocket(currentSymbol);
    });
  </script>
</body>
</html>
